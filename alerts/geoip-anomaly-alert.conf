[Geolocation Anomaly Alert]
description = Alerts on login attempts from unusual geographic locations
search = index=* sourcetype="/var/log/auth.log" "Failed password" | iplocation src_ip | search country!="US" country!="" | stats count by src_ip, country, city
reality_check = 1
alert.threshold_type = greater than
alert.threshold = 0
alert_type = always
schedule = */10 * * * *
actions = email, webhook
email.to = security-ops@company.com
email.subject = ALERT: Login from Unusual Geographic Location
email.body = Failed login attempt detected from unusual location:\n\nCountry: $country$\nCity: $city$\nSource IP: $src_ip$\nAttempts: $count$\n\nVerify legitimacy immediately.
webhook.url = https://your-threat-intel.com/api/geo-alerts
webhook.payload_format = json