[Failed Login Threshold Alert]
description = Triggers when user fails login 3+ times in 5 minutes
search = index=* sourcetype="/var/log/auth.log" "Failed password" | stats count as failed_attempts by user, src_ip | where failed_attempts >= 3
reality_check = 1
alert.threshold_type = greater than
alert.threshold = 0
alert_type = always
schedule = */5 * * * *
actions = email, webhook, summary_index
email.to = soc@company.com
email.subject = ALERT: Multiple Failed Login Attempts - User: $user$
email.body = User $user$ has failed login attempts from $src_ip$\nFailed Attempts: $failed_attempts$\n\nPossible account compromise. Check for suspicious activity.
webhook.url = https://your-incident-management.com/api/incidents/create
webhook.payload_format = json
summary_index = alerts