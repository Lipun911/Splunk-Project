[SSH Brute Force Attack Alert]
description = Detects SSH brute force attacks with 10+ failed attempts from single source
search = index=* sourcetype="/var/log/auth.log" ("Failed password" OR "Invalid user") | stats count as failed_attempts by src_ip | where failed_attempts >= 10
reality_check = 1
alert.threshold_type = greater than
alert.threshold = 0
alert_type = always
digest.alert.action = create
digest.alert.priority = high
digest.alert.severity = high
digest.ttl = 7d
digest.max_count = 20
schedule = */5 * * * *
actions = email, webhook
email.to = security-team@company.com
email.subject = ALERT: SSH Brute Force Attack Detected - $src_ip$
email.body = Potential SSH brute force attack detected:\n\nSource IP: $src_ip$\nFailed Attempts: $failed_attempts$\nTime: $now$\n\nAction: Block IP immediately or investigate.
webhook.url = https://your-siem-platform.com/api/alerts/create
webhook.payload_format = json